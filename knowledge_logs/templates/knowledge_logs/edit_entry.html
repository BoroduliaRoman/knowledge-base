{% extends 'knowledge_logs/base.html' %}

{% block content %}

<p><a href="{% url 'knowledge_logs:topic' topic.id %}">{{ topic }}</a></p>

<p>Edit entry:</p>

<form action="{% url 'knowledge_logs:edit_entry' topic.id %}" method='post'>
    {% csrf_token %}
    {{ form.as_p }}
    <button name="submit">Save changes</button>
</form>

{% endblock content %}
